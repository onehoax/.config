theme = "onedark"

[editor]
mouse = false
shell = ["bash", "-ic"]
#default-yank-register = "+"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[keys.normal]
C-s = ":w"
C-q = ":bc"
esc = ["collapse_selection", "keep_primary_selection"]
X = "extend_line_above"

[keys.insert]
C-s = ":w"
C-q = ":bc"

[keys.normal.space]
"." = ":config-reload"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎" 
tabpad = "·" # Tabs will look like "→···" (depending on tab width)

