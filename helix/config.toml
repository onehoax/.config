# base16_default, dracula, bogster, everforest_dark, focus_nova, peachpuff, varua, tokyonight-moon/storm
theme = "focus_nova"

[editor]
cursorline = true
color-modes = true
shell = ["bash", "-ic"]
text-width = 120
rulers = [120]
trim-trailing-whitespace = true
# Clipboard behavior:
#
# Default:
#   y       -> yank to the unnamed register (")
#   p       -> paste from the unnamed register (")
#   Space p -> paste from the system clipboard (+)
#
# With:
#   default-yank-register = "+"
#
# Helix uses the system clipboard (+) as the default register for
# yank, delete, and paste operations. As a result, `p` pastes from
# the system clipboard, making `Space p` usually unnecessary.
default-yank-register = "+"

[editor.smart-tab]
enable = false

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.statusline]
left = ["mode", "file-name", "read-only-indicator", "file-modification-indicator"]
center = ["spinner", "file-type", "separator", "spacer", "version-control"]
right = ["diagnostics", "selections", "register", "file-encoding", "file-line-ending", "position",  "position-percentage", "spacer"]
separator = "•"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎"
tabpad = "·" # Tabs will look like "→···" (depending on tab width)

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
X = "extend_line_above"
y = "yank_to_clipboard"

[keys.normal.space]
"y" = "no_op"
"Y" = "no_op"
"p" = "no_op"
"P" = "no_op"
"." = ":config-reload"
w = ":w"
q = ":bc"
g = ":sh git blame --date=relative -L %{cursor_line},+1 %{buffer_name} | sed -E 's/\\s+[0-9]+\\)\\s.*$/)/'"
G = "changed_file_picker"
