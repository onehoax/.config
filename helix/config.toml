# dracula, everforest_dark, focus_nova, varua, tokyonight-moon/storm
theme = "everforest_dark"

[editor]
mouse = false
cursorline = true
color-modes = true
shell = ["bash", "-ic"]
text-width = 120
rulers = [120]
trim-trailing-whitespace = true
#default-yank-register = "+"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
X = "extend_line_above"

[keys.normal.space]
"." = ":config-reload"
w = ":w"
q = ":bc"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎"
tabpad = "·" # Tabs will look like "→···" (depending on tab width)

